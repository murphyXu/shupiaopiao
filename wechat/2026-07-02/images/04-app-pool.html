<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <title>书漂漂 · 漂流广场</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f4f8f5;
      width: 390px;
      min-height: 844px;
      margin: 0 auto;
      color: #15211B;
    }
    .page { padding: 48px 22px 100px; }
    .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .page-title { font-size: 24px; font-weight: 700; }
    .guide { font-size: 13px; color: #159E63; }
    .point-row { display: flex; justify-content: space-between; font-size: 13px; color: #8a988f; margin-bottom: 16px; }
    .earn { color: #2FBE77; }
    .search {
      background: #f0f3f1; border-radius: 12px; padding: 12px 14px;
      font-size: 14px; color: #8a988f; margin-bottom: 16px;
    }
    .tabs { display: flex; gap: 24px; margin-bottom: 12px; }
    .tab { font-size: 15px; color: #8a988f; padding-bottom: 6px; }
    .tab.active { color: #2FBE77; font-weight: 600; border-bottom: 3px solid #2FBE77; }
    .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; }
    .chip { background: #f0f3f1; border-radius: 16px; padding: 6px 12px; font-size: 12px; white-space: nowrap; color: #52605a; }
    .chip.active { background: #EAFBF2; color: #159E63; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      background: #fff; border-radius: 16px; padding: 10px;
      box-shadow: 0 8px 24px rgba(21, 158, 99, 0.06);
    }
    .cover {
      width: 100%; aspect-ratio: 3/4; border-radius: 8px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #52605a; text-align: center; padding: 8px;
    }
    .book-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; min-height: 34px; }
    .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .coin { font-size: 12px; color: #2FBE77; font-weight: 600; }
    .pill { font-size: 10px; background: #f0f3f1; padding: 2px 8px; border-radius: 8px; color: #52605a; }
    .btn {
      background: #2FBE77; color: #fff; text-align: center;
      border-radius: 20px; padding: 8px; font-size: 13px; font-weight: 600;
    }
    .fab {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #EAFBF2; color: #159E63; padding: 10px 24px; border-radius: 24px;
      font-size: 14px; font-weight: 600; box-shadow: 0 4px 16px rgba(21,158,99,0.15);
    }
    .tabbar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 390px; background: #fff; border-top: 1px solid #e7eee9;
      display: flex; justify-content: space-around; padding: 10px 0 28px;
      font-size: 11px; color: #b3c0b8;
    }
    .tabbar .on { color: #2FBE77; }
  </style>
</head>
<body>
  <div class="page">
    <div class="title-row">
      <div class="page-title">漂流广场</div>
      <div class="guide">玩法介绍</div>
    </div>
    <div class="point-row">
      <span>登录后查看可用公益积分</span>
      <span class="earn">获得积分</span>
    </div>
    <div class="search">搜索书名 · 作者 · ISBN</div>
    <div class="tabs">
      <div class="tab active">推荐</div>
      <div class="tab">最新</div>
      <div class="tab">附近</div>
    </div>
    <div class="chips">
      <div class="chip active">全部</div>
      <div class="chip">绘本</div>
      <div class="chip">0-3岁</div>
      <div class="chip">3-6岁</div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="cover" style="background:#fff3bf">好饿的毛毛虫</div>
        <div class="book-title">好饿的毛毛虫</div>
        <div class="meta"><span class="coin">3 公益积分</span><span class="pill">绘本</span></div>
        <div class="btn">申请接漂</div>
      </div>
      <div class="card">
        <div class="cover" style="background:#ffc9d6">猜猜我有多爱你</div>
        <div class="book-title">猜猜我有多爱你</div>
        <div class="meta"><span class="coin">3 公益积分</span><span class="pill">绘本</span></div>
        <div class="btn">申请接漂</div>
      </div>
      <div class="card">
        <div class="cover" style="background:#bde7ff">大卫，不可以</div>
        <div class="book-title">大卫，不可以</div>
        <div class="meta"><span class="coin">4 公益积分</span><span class="pill">绘本</span></div>
        <div class="btn">申请接漂</div>
      </div>
      <div class="card">
        <div class="cover" style="background:#c8f5d8">彩虹色的花</div>
        <div class="book-title">彩虹色的花</div>
        <div class="meta"><span class="coin">3 公益积分</span><span class="pill">绘本</span></div>
        <div class="btn">申请接漂</div>
      </div>
    </div>
  </div>
  <div class="fab">＋ 上漂赠书</div>
  <div class="tabbar">
    <div class="on">漂流</div>
    <div>书架</div>
    <div>我的</div>
  </div>
</body>
</html>
